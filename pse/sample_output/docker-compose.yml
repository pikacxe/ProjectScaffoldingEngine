version: '3.9'
services:
  storeapi:
    build: .
    container_name: storeapi
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
      - rabbitmq
  # dependencies
  db:
    image: postgres:17
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
  redis:
    image: redis:8
    container_name: redis
    ports:
      - "6379:6379"
  rabbitmq:
    image: rabbitmq:4
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
