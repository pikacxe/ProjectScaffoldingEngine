services:
  storeapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: storeapi:latest
    ports:
    - 8080:8080
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Database: Host=postgres;Port=5432;Database=app;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379
    networks:
    - backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres -d app
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
    - postgres-data:/var/lib/postgresql/data
    networks:
    - backend
  redis:
    image: redis:8
    command:
    - redis-server
    - --appendonly
    - 'yes'
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
    - redis-data:/data
    networks:
    - backend
networks:
  backend:
    driver: bridge
volumes:
  postgres-data: {}
  redis-data: {}
